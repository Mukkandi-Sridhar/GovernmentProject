version: "3.9"

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: ap-civic-api
    ports:
      - "8000:8000"
    env_file:
      - ../apps/api/.env.example

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: ap-civic-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - api

